<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylereg.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <title>Register</title>
</head>
<header>
    <div class="d-flex py-2">
        <div class="flex-shrink-0">
            <img src="logo1.png" alt="LOGO" width="30%">
        </div>
    </div>
</header>

<body>
    <div class="container-fluid mt-3">
        <div class="d-flex justify-content-center">
            <div class="p-2">
                <h5>CHOOSE EDUCATIONAL INSTITUTION: </h5>
            </div>
            <div class="p-2">
                <button class="btn btn-secondary" type="button" data-bs-toggle="offcanvas"
                    data-bs-target="#staticBackdrop" aria-controls="staticBackdrop">
                    CHOOSE
                </button>
            </div>
        </div>
        <div class="offcanvas offcanvas-start" data-bs-backdrop="static" tabindex="-1" id="staticBackdrop"
            aria-labelledby="staticBackdropLabel">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title" id="staticBackdropLabel">INSTITUTIONS</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            <div class="offcanvas-body">
                <ul class="list-group list-group-flush">
                    <a href="#" data-bs-dismiss="offcanvas"
                        class="list-group-item list-group-item-success list-group-item-action">SCHOOLS</a>
                    <a href="#" data-bs-dismiss="offcanvas" class="list-group-item  list-group-item-action">IPE
                        COLLEGE</a>
                    <a href="#" data-bs-dismiss="offcanvas"
                        class="list-group-item list-group-item-success list-group-item-action">POLYTECHNIC COLLEGE</a>
                    <a href="#" data-bs-dismiss="offcanvas" class="list-group-item list-group-item-action">UNDERGRAD</a>
                    <a href="#" data-bs-dismiss="offcanvas"
                        class="list-group-item list-group-item-success list-group-item-action">POSTGRAD</a>
                    <a href="#" data-bs-dismiss="offcanvas" class="list-group-item list-group-item-action">PHD</a>
                </ul>
            </div>
        </div>
    </div>
    <hr class="border border-success border-3 opacity-50">
    <div class="container">
        <div class="input-group input-group-lg mb-3">
            <span class="input-group-text" id="basic-addon1">Institution's Name</span>
            <input type="text" class="form-control" placeholder="Name" aria-label="Username"
                aria-describedby="basic-addon1">
        </div>
        <div class="input-group input-group-lg">
            <span class="input-group-text">Address</span>
            <textarea class="form-control" aria-label="With textarea"></textarea>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>

</html>
